<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>8/3 Premium Gift</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#ff1493,#8a2be2,#ff69b4);
    background-size:400% 400%;
    animation:bgMove 12s infinite alternate;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

/* PAGE 1 */
.page1{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
}

.heart{
    width:220px;
    height:220px;
    background:#ff3366;
    position:relative;
    transform:rotate(-45deg);
    cursor:pointer;
    animation:beat 1s infinite;
    box-shadow:0 0 80px #ff1493;
}
.heart:before,
.heart:after{
    content:"";
    width:220px;
    height:220px;
    background:#ff3366;
    border-radius:50%;
    position:absolute;
}
.heart:before{top:-110px;left:0}
.heart:after{left:110px;top:0}

@keyframes beat{
    0%,100%{transform:rotate(-45deg) scale(1)}
    50%{transform:rotate(-45deg) scale(1.15)}
}

/* PAGE 2 */
.page2{
    position:absolute;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
}

/* CARD */
.card{
    position:relative;
    padding:60px 80px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(25px);
    text-align:center;
    color:white;
    overflow:hidden;
    box-shadow:0 0 60px rgba(255,0,200,0.8);
    animation:cardAppear 1.5s ease forwards;
}

/* Neon border */
.card::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:35px;
    background:linear-gradient(45deg,#ff00cc,#ff1493,#00ffff,#ff00cc);
    background-size:400%;
    z-index:-1;
    animation:borderRun 6s linear infinite;
}

@keyframes borderRun{
    0%{background-position:0%}
    100%{background-position:400%}
}

@keyframes cardAppear{
    from{opacity:0;transform:scale(0.8)}
    to{opacity:1;transform:scale(1)}
}

.card h1{
    font-size:70px;
    position:relative;
    color:white;
    text-shadow:0 0 25px #ff69b4;
    margin-bottom:20px;
    overflow:hidden;
}

/* Light sweep */
.card h1::after{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.9),transparent);
    animation:shineMove 4s infinite;
}
@keyframes shineMove{
    0%{left:-100%}
    100%{left:100%}
}

/* Animated lines */
.card h2 span{
    display:block;
    opacity:0;
    transform:translateY(30px);
    animation:lineUp 1s forwards;
}
@keyframes lineUp{
    to{opacity:1;transform:translateY(0)}
}

.card h2{
    font-size:28px;
    line-height:1.6;
}

/* QR */
.qr{
    margin-top:40px;
    padding:20px;
    background:white;
    border-radius:25px;
    animation:qrPop 1.5s ease forwards;
}
@keyframes qrPop{
    from{transform:scale(0);opacity:0}
    to{transform:scale(1);opacity:1}
}

/* Petals */
.petal{
    position:absolute;
    top:-10px;
    font-size:20px;
    animation:fall linear forwards;
}
@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="page1" id="page1">
    <div class="heart" onclick="showGift()"></div>
    <h2 style="margin-top:30px;color:white;">Bấm vào trái tim 💖</h2>
</div>

<div class="page2" id="page2">
    <div class="card">
        <h1>💐 8 / 3 💐</h1>
        <h2>
            <span style="animation-delay:0.5s">Chúc bạn luôn xinh đẹp 🌸</span>
            <span style="animation-delay:1s">Luôn rạng rỡ và hạnh phúc 💖</span>
            <span style="animation-delay:1.5s">Thành công trên mọi con đường ✨</span>
        </h2>
        <div class="qr" id="qrcode"></div>
    </div>
</div>

<script>
let qrCreated=false;

function showGift(){
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="flex";

    if(!qrCreated){
        new QRCode(document.getElementById("qrcode"), {
            text: "Chuc mung 8/3! Chuc ban luon hanh phuc va xinh dep 💖",
            width: 200,
            height: 200
        });
        qrCreated=true;
    }

    startPetals();
    startFireworks();
}

/* PETALS */
function startPetals(){
    setInterval(()=>{
        let petal=document.createElement("div");
        petal.className="petal";
        petal.innerHTML="🌸";
        petal.style.left=Math.random()*100+"vw";
        petal.style.animationDuration=(4+Math.random()*4)+"s";
        document.body.appendChild(petal);
        setTimeout(()=>petal.remove(),8000);
    },400);
}

/* FIREWORKS */
function startFireworks(){
    setInterval(()=>{
        let x=Math.random()*window.innerWidth;
        let y=Math.random()*window.innerHeight/2;
        for(let i=0;i<40;i++){
            let spark=document.createElement("div");
            spark.style.position="absolute";
            spark.style.left=x+"px";
            spark.style.top=y+"px";
            spark.style.width="6px";
            spark.style.height="6px";
            spark.style.borderRadius="50%";
            spark.style.background=`hsl(${Math.random()*360},100%,60%)`;
            spark.style.transition="all 1.2s ease-out";
            document.body.appendChild(spark);

            setTimeout(()=>{
                spark.style.left=x+(Math.random()-0.5)*400+"px";
                spark.style.top=y+(Math.random()-0.5)*400+"px";
                spark.style.opacity=0;
            },10);

            setTimeout(()=>spark.remove(),1200);
        }
    },2500);
}

</script>

</body>
</html>
